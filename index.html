<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gravel Crew v2.3 - PRECISION</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #ff5500; --msg: #00ff41; --panel: #1a1a1a; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; height: 100svh; display: flex; flex-direction: column; overflow: hidden; }
        
        #header { display: flex; justify-content: space-between; padding: 5px; font-size: 0.9rem; color: #888; flex-shrink: 0; }
        #timer-display { font-family: monospace; font-size: 3.8rem; color: var(--accent); font-weight: 900; flex-shrink: 0; margin: 5px 0; }

        #display-box { border: 3px solid #222; border-radius: 20px; background: #000; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; margin-bottom: 10px; position: relative; }
        
        /* OFFSET CONTROLS overlayed on display */
        .offset-controls { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; }
        .btn-off { background: #333; color: white; border: 1px solid #444; padding: 15px 10px; border-radius: 10px; font-weight: bold; font-size: 1rem; width: 60px; }
        .btn-off:active { background: var(--accent); }

        .label { font-size: 0.8rem; color: #555; text-transform: uppercase; letter-spacing: 2px; }
        .dist-val { font-size: 8rem; font-weight: 900; line-height: 1; color: var(--msg); font-variant-numeric: tabular-nums; }
        
        #offset-label { font-size: 0.9rem; color: var(--accent); font-weight: bold; margin-top: 5px; }

        #progress-container { background: #111; height: 10px; border-radius: 5px; margin: 10px 60px 10px 20px; overflow: hidden; border: 1px solid #333; }
        #progress-bar { background: var(--msg); height: 100%; width: 0%; transition: width 0.3s; }

        .footer-controls { flex-shrink: 0; }
        .settings-panel { background: var(--panel); padding: 12px; border-radius: 12px; margin-bottom: 10px; text-align: left; }
        input[type="range"] { width: 100%; height: 35px; accent-color: var(--accent); }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 16px; border-radius: 10px; border: none; font-weight: bold; text-transform: uppercase; }
        .btn-load { background: #333; color: white; }
        .btn-start { background: var(--msg); color: black; height: 70px; font-size: 1.5rem; grid-column: span 2; }
        
        .acc-bad { color: #ff4444 !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="header">
        <span>GPS: <b id="acc">--</b>m</span>
        <span id="point-info">PT 0 / 0</span>
    </div>

    <div id="timer-display">00:00.0</div>

    <div id="display-box">
        <div class="label">Meters to Next</div>
        <div id="dist-display" class="dist-val">--</div>
        <div id="offset-label">OFFSET: 0m</div>
        
        <div class="offset-controls">
            <button class="btn-off" onclick="adjustOffset(5)">+5m</button>
            <button class="btn-off" onclick="adjustOffset(-5)">-5m</button>
        </div>

        <div id="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div class="footer-controls">
        <div class="settings-panel">
            <div style="display:flex; justify-content: space-between; font-size:0.7rem; color:var(--accent); margin-bottom:5px;">
                <span>CO-DRIVER SPEED</span>
                <span id="speed-label">1.4x</span>
            </div>
            <input type="range" id="rate-slider" min="1.0" max="2.2" step="0.1" value="1.4">
        </div>

        <div class="btn-group">
            <input type="file" id="file-input" accept=".json" style="display:none">
            <button class="btn-load" onclick="document.getElementById('file-input').click()">LOAD</button>
            <button class="btn-load" onclick="toggleFullscreen()">FULL</button>
            <button id="start-btn" class="btn-start" onclick="startStage()" disabled>START STAGE</button>
        </div>
    </div>

<script>
    let stage = [];
    let idx = 0;
    let lastCoord = null;
    let lastTime = null;
    let currentKmh = 0;
    let startTime = null;
    let timerInterval = null;
    let cooldownUntil = 0;
    let manualOffset = 0; // The new adjustment variable

    const R = 6371000;
    const synth = window.speechSynthesis;

    // --- TUNING PARAMETERS ---
    const BASE_TRIGGER = 35;     
    const MAX_TRIGGER = 80;      
    const SPEED_SENSITIVITY = 1.2;

    function adjustOffset(val) {
        manualOffset += val;
        document.getElementById('offset-label').innerText = `OFFSET: ${manualOffset}m`;
        if (window.navigator.vibrate) window.navigator.vibrate(50);
    }

    document.getElementById('file-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            stage = JSON.parse(event.target.result);
            document.getElementById('point-info').innerText = `PT 1 / ${stage.length}`;
            document.getElementById('start-btn').disabled = false;
        };
        reader.readAsText(e.target.files[0]);
    };

    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
        else document.exitFullscreen();
    }

    function getDist(lat1, lon1, lat2, lon2) {
        const rad = Math.PI / 180;
        const a = Math.sin(((lat2-lat1)*rad)/2)**2 + Math.cos(lat1*rad) * Math.cos(lat2*rad) * Math.sin(((lon2-lon1)*rad)/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function announce(txt) {
        if (synth.speaking) synth.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.rate = document.getElementById('rate-slider').value;
        const voices = synth.getVoices();
        msg.voice = voices.find(v => v.name.includes('Google') && v.lang.includes('en-GB')) || voices.find(v => v.lang.includes('en-GB')) || voices[0];
        synth.speak(msg);
    }

    function updateTimer() {
        if (!startTime) return;
        const diff = Date.now() - startTime;
        const mins = Math.floor(diff / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        const ms = Math.floor((diff % 1000) / 100);
        document.getElementById('timer-display').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}.${ms}`;
    }

    async function startStage() {
        idx = 0;
        document.getElementById('start-btn').innerText = "LIVE";
        document.getElementById('start-btn').style.background = "#ffaa00";
        if ('wakeLock' in navigator) await navigator.wakeLock.request('screen').catch(()=>{});

        navigator.geolocation.watchPosition((pos) => {
            const { latitude: lat, longitude: lon, accuracy } = pos.coords;
            const now = Date.now();
            document.getElementById('acc').innerText = accuracy.toFixed(1);
            document.getElementById('acc').className = accuracy > 12 ? 'acc-bad' : '';

            if (lastCoord) {
                const distMoved = getDist(lastCoord.lat, lastCoord.lon, lat, lon);
                const timeDiff = (now - lastTime) / 1000;
                if (timeDiff > 0) currentKmh = (distMoved / timeDiff) * 3.6;
            }
            lastCoord = { lat, lon };
            lastTime = now;

            if (idx < stage.length && now > cooldownUntil) {
                const d = getDist(lat, lon, stage[idx].lat, (stage[idx].lng || stage[idx].lon));
                if (!isNaN(d)) {
                    document.getElementById('dist-display').innerText = Math.round(d);

                    // TRIGGER = (Base + Speed Component) + Manual Offset
                    let triggerWindow = (BASE_TRIGGER + (currentKmh * SPEED_SENSITIVITY / 3.6)) + manualOffset;
                    
                    if (triggerWindow > MAX_TRIGGER) triggerWindow = MAX_TRIGGER;

                    if (d < triggerWindow) {
                        if (idx === 0 && !startTime) {
                            startTime = now;
                            timerInterval = setInterval(updateTimer, 100);
                        }
                        announce(stage[idx].note);
                        idx++;
                        cooldownUntil = now + 1200; 
                        updateUI();
                    }
                }
            } else if (idx >= stage.length) {
                clearInterval(timerInterval);
            }
        }, null, { enableHighAccuracy: true, maximumAge: 0 });
    }

    function updateUI() {
        const pct = (idx / stage.length) * 100;
        document.getElementById('progress-bar').style.width = pct + "%";
        document.getElementById('point-info').innerText = `PT ${Math.min(idx + 1, stage.length)} / ${stage.length}`;
    }

    document.getElementById('rate-slider').oninput = function() { document.getElementById('speed-label').innerText = this.value + "x"; };
</script>
</body>
</html>
