<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gravel Crew v1.9 - DASH</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #ff5500; --msg: #00ff41; --panel: #1a1a1a; }
        * { box-sizing: border-box; }
        
        body { 
            background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; 
            text-align: center; height: 100svh; display: flex; flex-direction: column; overflow: hidden; 
        }
        
        #header { display: flex; justify-content: space-between; padding: 5px; font-size: 0.9rem; color: #888; flex-shrink: 0; }
        
        /* HUGE TIMER */
        #timer-display { font-family: monospace; font-size: 4rem; color: var(--accent); font-weight: 900; flex-shrink: 0; margin: 10px 0; }

        #display-box { 
            border: 3px solid #333; border-radius: 20px; background: #000; 
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center; margin-bottom: 15px; 
        }

        .label { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 2px; }
        
        /* HUGE DISTANCE */
        .dist-val { font-size: 8rem; font-weight: 900; line-height: 1; color: var(--msg); font-variant-numeric: tabular-nums; }
        
        #progress-container { background: #222; height: 15px; border-radius: 10px; margin: 20px 40px; overflow: hidden; border: 1px solid #444; }
        #progress-bar { background: var(--msg); height: 100%; width: 0%; transition: width 0.3s; }

        .footer-controls { flex-shrink: 0; }
        .settings-panel { background: var(--panel); padding: 12px; border-radius: 12px; margin-bottom: 10px; text-align: left; }
        .setting-row { margin-bottom: 8px; }
        .setting-row label { display: block; font-size: 0.7rem; color: var(--accent); }
        input[type="range"] { width: 100%; height: 30px; accent-color: var(--accent); }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; border-radius: 10px; border: none; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
        .btn-load { background: #333; color: white; }
        .btn-start { background: var(--msg); color: black; height: 70px; font-size: 1.5rem; grid-column: span 2; }
        
        .acc-bad { color: #ff4444 !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="header">
        <span>GPS: <b id="acc">--</b>m</span>
        <span id="point-info">POINT 0 / 0</span>
    </div>

    <div id="timer-display">00:00.0</div>

    <div id="display-box">
        <div class="label">Meters to Next Note</div>
        <div id="dist-display" class="dist-val">--</div>
        
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="status-text" style="color:#444; font-size: 0.7rem; text-transform: uppercase;">Awaiting Start</div>
    </div>

    <div class="footer-controls">
        <div class="settings-panel">
            <div class="setting-row">
                <input type="range" id="rate-slider" min="0.8" max="2.2" step="0.1" value="1.4">
                <div style="display:flex; justify-content: space-between; font-size:0.6rem; color:#888; margin-top:5px;">
                    <span>SLOW CO-DRIVER</span>
                    <span>FAST CO-DRIVER</span>
                </div>
            </div>
            <button onclick="testAudio()" style="background:none; color:var(--accent); border:1px solid var(--accent); width:100%; padding:5px; font-size:0.6rem; border-radius:5px;">🔊 TEST VOICE</button>
        </div>

        <div class="btn-group">
            <input type="file" id="file-input" accept=".json" style="display:none">
            <button class="btn-load" onclick="document.getElementById('file-input').click()">📁 LOAD</button>
            <button class="btn-load" onclick="toggleFullscreen()">⛶ FULL</button>
            <button id="start-btn" class="btn-start" onclick="startStage()" disabled>START STAGE</button>
        </div>
    </div>

<script>
    // Logic remains identical to v1.8 to ensure reliability, 
    // but UI updates now target the new Dash elements.
    let stage = [];
    let idx = 0;
    let lastDist = Infinity;
    let startTime = null;
    let timerInterval = null;
    const RADIUS = 35; 
    const CLOSE_ZONE = 50;
    const R = 6371000;
    const synth = window.speechSynthesis;

    document.getElementById('file-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            stage = JSON.parse(event.target.result);
            document.getElementById('point-info').innerText = `POINT 1 / ${stage.length}`;
            document.getElementById('status-text').innerText = "STAGE LOADED - READY";
            document.getElementById('start-btn').disabled = false;
        };
        reader.readAsText(e.target.files[0]);
    };

    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
        else document.exitFullscreen();
    }

    function getDist(lat1, lon1, lat2, lon2) {
        const rad = Math.PI / 180;
        const a = Math.sin(((lat2-lat1)*rad)/2)**2 + Math.cos(lat1*rad) * Math.cos(lat2*rad) * Math.sin(((lon2-lon1)*rad)/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function announce(txt) {
        if (synth.speaking) synth.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.rate = document.getElementById('rate-slider').value;
        const voices = synth.getVoices();
        msg.voice = voices.find(v => v.lang.includes('en-GB')) || voices[0];
        synth.speak(msg);
    }

    function testAudio() { announce("Ready to start. 5, 4, 3, 2, 1, Go."); }

    function updateTimer() {
        if (!startTime) return;
        const diff = new Date().getTime() - startTime;
        const mins = Math.floor(diff / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        const ms = Math.floor((diff % 1000) / 100);
        document.getElementById('timer-display').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}.${ms}`;
    }

    async function startStage() {
        idx = 0;
        document.getElementById('start-btn').innerText = "STAGE LIVE";
        document.getElementById('start-btn').style.background = "#ffaa00";
        document.getElementById('status-text').innerText = "DRIVE TO START LINE";
        if ('wakeLock' in navigator) await navigator.wakeLock.request('screen').catch(()=>{});

        navigator.geolocation.watchPosition((pos) => {
            const { latitude: lat, longitude: lon, accuracy } = pos.coords;
            const accEl = document.getElementById('acc');
            accEl.innerText = accuracy.toFixed(1);
            accEl.className = accuracy > 12 ? 'acc-bad' : '';

            if (idx < stage.length) {
                const d = getDist(lat, lon, stage[idx].lat, (stage[idx].lng || stage[idx].lon));
                if (!isNaN(d)) {
                    document.getElementById('dist-display').innerText = Math.round(d);
                    if (d < RADIUS || (d < CLOSE_ZONE && d > lastDist)) {
                        if (idx === 0 && !startTime) {
                            startTime = new Date().getTime();
                            timerInterval = setInterval(updateTimer, 100);
                            document.getElementById('status-text').innerText = "RACING";
                        }
                        announce(stage[idx].note);
                        idx++;
                        lastDist = Infinity;
                        updateUI();
                    } else { lastDist = d; }
                }
            } else {
                clearInterval(timerInterval);
                document.getElementById('status-text').innerText = "STAGE FINISHED";
            }
        }, null, { enableHighAccuracy: true, maximumAge: 0 });
    }

    function updateUI() {
        const pct = (idx / stage.length) * 100;
        document.getElementById('progress-bar').style.width = pct + "%";
        document.getElementById('point-info').innerText = `POINT ${Math.min(idx + 1, stage.length)} / ${stage.length}`;
    }
</script>
</body>
</html>
